<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Access</title>
    <style>
        :root {
            --accent: #ff0044;
            --glass: rgba(0, 0, 0, 0.9);
            --whatsapp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000 url('Now.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        @keyframes float-card {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 25px;
            width: 92%;
            max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0,0,0,1);
            animation: fadeIn 1s ease-out, float-card 5s ease-in-out infinite;
        }

        @keyframes border-breathe {
            0%, 100% { box-shadow: 0 0 5px var(--accent); border-color: rgba(255, 0, 68, 0.4); }
            50% { box-shadow: 0 0 25px var(--accent); border-color: var(--accent); }
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid var(--accent);
            background: #000;
            animation: border-breathe 3s infinite ease-in-out;
            cursor: pointer;
        }

        #inner-video { width: 100%; height: 100%; object-fit: cover; }

        /* Small instruction for sound */
        .sound-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            text-transform: uppercase;
            pointer-events: none;
        }

        @keyframes text-shine {
            0%, 100% { text-shadow: 0 0 10px var(--accent); opacity: 0.9; }
            50% { text-shadow: 0 0 25px var(--accent), 0 0 40px var(--accent); opacity: 1; }
        }

        h1 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: text-shine 2s infinite ease-in-out;
        }

        .platform-tag {
            display: inline-block;
            background: rgba(37, 211, 102, 0.1);
            color: var(--whatsapp);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid var(--whatsapp);
        }

        .btn {
            position: relative;
            display: block;
            padding: 20px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.1rem;
            border-radius: 50px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255, 0, 68, 0.5);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -100%;
            width: 80%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: rotate(25deg);
            animation: sweep 4s infinite linear;
        }

        @keyframes sweep {
            0% { left: -120%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px var(--accent);
        }

        .warning {
            margin-top: 18px;
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <div class="video-wrapper" onclick="toggleSound()">
            <video autoplay muted loop playsinline id="inner-video">
                <source src="Good.mp4" type="video/mp4">
            </video>
            <div class="sound-hint">Tap for Sound</div>
        </div>

        <div class="platform-tag">Live Chemistry</div>
        
        <h1>INTENSE VIBES</h1>
        
        <p style="color: #bbb; font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px;">
            Enter the private room for raw chemistry and high-tension connections. Exclusive access only.
        </p>
        
        <a href="https://chat.whatsapp.com/FRPDNHaVoYuDthHUEsNGJp" class="btn">JOIN THE VIBE</a>
        
        <div class="warning">18+ | SECURE & DISCREET</div>
    </div>

    <script>
        function toggleSound() {
            var video = document.getElementById("inner-video");
            var hint = document.querySelector(".sound-hint");
            if (video.muted) {
                video.muted = false;
                hint.innerHTML = "Sound On";
            } else {
                video.muted = true;
                hint.innerHTML = "Tap for Sound";
            }
        }
    </script>

</body>
</html>
