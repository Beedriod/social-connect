<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Access</title>
    <style>
        :root {
            --accent: #ff0044;
            --glass: rgba(0, 0, 0, 0.88);
            --whatsapp: #25D366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000 url('images/now.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 30px;
            width: 92%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 1);
            animation: fadeIn 1s ease-out;
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #000;
        }

        #inner-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #fff;
            font-size: 1.7rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #ccc;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .platform-tag {
            display: inline-block;
            background: rgba(37, 211, 102, 0.15);
            color: var(--whatsapp);
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .btn {
            display: block;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 26px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 0, 68, 0.3);
        }

        .btn:hover {
            transform: scale(1.03);
            background: #ff1a5a;
        }

        .warning {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .container { padding: 25px 15px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <div class="video-wrapper">
            <video autoplay muted loop playsinline id="inner-video">
                <source src="videos/good.mp4" type="video/mp4">
            </video>
        </div>

        <div class="platform-tag">Exclusive WhatsApp Group</div>
        
        <h1>INTENSE VIBES</h1>
        
        <p>Join our private WhatsApp community for raw chemistry and high-tension connections. No games, just action.</p>
        
        <a href="https://chat.whatsapp.com/FRPDNHaVoYuDthHUEsNGJp" class="btn">JOIN WHATSAPP GROUP</a>
        
        <div class="warning">18+ | DISCREET & INTENSE</div>
    </div>

</body>
</html>
